<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WC CMS — export frame</title>
<link rel="stylesheet" href="assets/wc-tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin:0; padding:0; }
  body { font-family: var(--wc-font-body); background: #fff; -webkit-font-smoothing: antialiased; width: 1440px; }
  #root { width: 1440px; }
  button { font-family: inherit; }
  @keyframes wcPulse { 0% { box-shadow:0 0 0 0 rgba(16,185,129,0.55);} 70%{ box-shadow:0 0 0 10px rgba(16,185,129,0);} 100%{ box-shadow:0 0 0 0 rgba(16,185,129,0);} }
  @keyframes wcPopIn { from { opacity:1; transform: none;} to { opacity:1; transform: none;} }
  /* disable scrollbars for clean plugin capture */
  body { overflow: visible; }
</style>
</head>

<div id="root"></div>
